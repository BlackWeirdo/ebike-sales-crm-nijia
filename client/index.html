<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý cửa hàng xe đạp điện</title>
    <!-- Apply saved/system color scheme before first paint to avoid a flash of the wrong theme. -->
    <script>
      try {
        var s = localStorage.getItem('crm-color-scheme') || 'auto'
        var dark = s === 'dark' || (s === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        document.documentElement.setAttribute('data-mantine-color-scheme', dark ? 'dark' : 'light')
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
